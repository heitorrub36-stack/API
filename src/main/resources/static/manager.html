<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Sistema Passaporte - Gerente</title><link rel="stylesheet" href="style.css"></head><body>
<header class="topbar"><h1>Sistema Passaporte</h1><nav><a href="demo.html">Candidato</a><a href="rh.html">RH</a><a href="medical.html">Medicina</a><a href="manager.html" class="active">Gerente</a><a href="dashboard.html">Dashboard</a></nav></header>
<main class="container"><section class="page-title"><span class="eyebrow">Gerente</span><h2>Decisão de admissão</h2><p>Consulte documentos, avalie candidatos aptos, aprove ou reprove a admissão e assine a decisão final.</p></section><p id="managerMessage" class="message" hidden></p>
<section class="panel"><div class="form-grid"><div class="form-group"><label for="managerReviewer">Gerente responsável</label><select id="managerReviewer" required></select></div><div class="form-group"><label for="passportSelect">Passaporte</label><select id="passportSelect"></select></div></div><div id="passportDetails" class="details-box"></div></section>
<section class="panel"><h3>Documentos para decisão gerencial</h3><div id="managerArtifacts" class="artifact-list"></div></section>
<section class="panel"><h3>Registrar decisão</h3><form id="managerForm"><div class="form-grid"><div class="form-group"><label for="managerStatus">Decisão</label><select id="managerStatus" required><option value="APROVADO">APROVADO</option><option value="REPROVADO">REPROVADO</option><option value="PENDENTE">PENDENTE</option></select></div><div class="form-group"><label for="managerNotes">Observações</label><textarea id="managerNotes" rows="3"></textarea></div></div><button>Salvar decisão</button><button type="button" id="cancelButton" class="danger-button">Cancelar passaporte</button></form></section>
<section class="panel"><h3>Fluxo de etapas gerencial</h3><div id="managerProcessFlow" class="process-flow-container"></div></section>
</main><script src="shared.js"></script><script src="manager.js"></script></body></html>
