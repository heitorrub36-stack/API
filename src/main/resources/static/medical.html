<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Sistema Passaporte - Medicina</title><link rel="stylesheet" href="style.css"></head><body>
<header class="topbar"><h1>Sistema Passaporte</h1><nav><a href="demo.html">Candidato</a><a href="rh.html">RH</a><a href="medical.html" class="active">Medicina</a><a href="manager.html">Gerente</a><a href="dashboard.html">Dashboard</a></nav></header>
<main class="container"><section class="page-title"><span class="eyebrow">Medicina do Trabalho</span><h2>Avaliação médica e validação de documentos</h2><p>Valide artefatos médicos, registre APTO/INAPTO e assine tarefas, subtarefas ou documentos.</p></section><p id="medicalMessage" class="message" hidden></p>
<section class="panel"><div class="form-grid"><div class="form-group"><label for="medicalReviewer">Médico responsável</label><select id="medicalReviewer" required></select></div><div class="form-group"><label for="passportSelect">Passaporte</label><select id="passportSelect"></select></div></div><div id="passportDetails" class="details-box"></div></section>
<section class="panel"><h3>Documentos para Medicina</h3><div id="medicalArtifacts" class="artifact-list"></div></section>
<section class="panel"><h3>Registrar avaliação</h3><form id="medicalForm"><div class="form-grid"><div class="form-group"><label for="medicalStatus">Resultado</label><select id="medicalStatus" required><option value="APTO">APTO</option><option value="INAPTO">INAPTO</option><option value="PENDENTE">PENDENTE</option></select></div><div class="form-group"><label for="medicalNotes">Observações/laudo</label><textarea id="medicalNotes" rows="3"></textarea></div></div><button>Salvar avaliação médica</button></form></section>
<section class="panel"><h3>Workflow médico</h3><div id="medicalWorkflow" class="workflow-container"></div></section>
</main><script src="shared.js"></script><script src="medical.js"></script></body></html>
